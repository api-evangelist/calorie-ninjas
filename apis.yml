description: >-
  CalorieNinjas provides an easy, free Nutrition Facts and Recipe API.
  Developers can retrieve nutrition information for over 100,000 foods and
  beverages using natural language queries, extract nutrition information from
  images of food-related text (menus, recipes, food journals), and search
  recipes matching search queries. All endpoints use a simple API key
  authentication model via the X-Api-Key header.

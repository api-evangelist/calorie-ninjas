        type: Documentation
      - url: openapi/calorieninjas-openapi.yml
        type: OpenAPI
      - url: openapi/calorieninjas-openapi-review.yml
        type: Review
    description: >-
      The CalorieNinjas API returns nutrition and recipe data for 100,000+
      foods and beverages. It offers three endpoints: GET /nutrition for
      natural-language nutrition lookups (returns calories, macros, vitamins,
      and minerals), POST /imagetextnutrition for extracting nutrition from
      images containing food/beverage text, and GET /recipe for searching
      recipes with titles, ingredients, servings, and instructions. All
      requests authenticate with an API key sent in the X-Api-Key header.

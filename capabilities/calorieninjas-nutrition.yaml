naftiko: 1.0.0-alpha2
info:
  label: CalorieNinjas — Nutrition
  description: 'CalorieNinjas — Nutrition. 1 operations. Lead operation: CalorieNinjas Get nutrition information. Self-contained
    Naftiko capability covering one Calorie Ninjas business surface.'
  tags:
  - Calorie Ninjas
  - Nutrition
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CALORIE_NINJAS_API_KEY: CALORIE_NINJAS_API_KEY
capability:
  consumes:
  - type: http
    namespace: calorieninjas-nutrition
    baseUri: https://api.calorieninjas.com/v1
    description: CalorieNinjas — Nutrition business capability. Self-contained, no shared references.
    resources:
    - name: nutrition
      path: /nutrition
      operations:
      - name: get
        method: GET
        description: CalorieNinjas Get nutrition information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: A string containing food or drink items. Prefix a quantity before an item to calculate for that quantity.
            Default is 100 grams if unspecified.
          required: true
    authentication:
      type: apikey
      key: X-Api-Key
      value: '{{env.CALORIE_NINJAS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: calorieninjas-nutrition-rest
    port: 8080
    description: REST adapter for CalorieNinjas — Nutrition. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/nutrition
      name: nutrition
      description: REST surface for nutrition.
      operations:
      - method: GET
        name: get
        description: CalorieNinjas Get nutrition information
        call: calorieninjas-nutrition.get
        with:
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: calorieninjas-nutrition-mcp
    port: 9090
    transport: http
    description: MCP adapter for CalorieNinjas — Nutrition. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: calorieninjas-get-nutrition-information
      description: CalorieNinjas Get nutrition information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: calorieninjas-nutrition.get
      with:
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.

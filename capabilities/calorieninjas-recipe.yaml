naftiko: 1.0.0-alpha2
info:
  label: CalorieNinjas — Recipe
  description: 'CalorieNinjas — Recipe. 1 operations. Lead operation: CalorieNinjas Get recipes. Self-contained Naftiko capability
    covering one Calorie Ninjas business surface.'
  tags:
  - Calorie Ninjas
  - Recipe
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    CALORIE_NINJAS_API_KEY: CALORIE_NINJAS_API_KEY
capability:
  consumes:
  - type: http
    namespace: calorieninjas-recipe
    baseUri: https://api.calorieninjas.com/v1
    description: CalorieNinjas — Recipe business capability. Self-contained, no shared references.
    resources:
    - name: recipe
      path: /recipe
      operations:
      - name: get
        method: GET
        description: CalorieNinjas Get recipes
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
          description: A string containing a dish name. Partial match is supported.
          required: true
    authentication:
      type: apikey
      key: X-Api-Key
      value: '{{env.CALORIE_NINJAS_API_KEY}}'
      placement: header
  exposes:
  - type: rest
    namespace: calorieninjas-recipe-rest
    port: 8080
    description: REST adapter for CalorieNinjas — Recipe. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/recipe
      name: recipe
      description: REST surface for recipe.
      operations:
      - method: GET
        name: get
        description: CalorieNinjas Get recipes
        call: calorieninjas-recipe.get
        with:
          query: rest.query
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: calorieninjas-recipe-mcp
    port: 9090
    transport: http
    description: MCP adapter for CalorieNinjas — Recipe. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: calorieninjas-get-recipes
      description: CalorieNinjas Get recipes
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: calorieninjas-recipe.get
      with:
        query: tools.query
      outputParameters:
      - type: object
        mapping: $.
